apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper-deployment
  namespace: shipping-on-the-air
  labels:
    app: zookeeper-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper-pod
  template:
    metadata:
      labels:
        app: zookeeper-pod
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          ports:
            - containerPort: 2181

---

apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: shipping-on-the-air
spec:
  ports:
    - port: 2181
      targetPort: 2181
  selector:
    app: zookeeper-pod

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-deployment
  namespace: shipping-on-the-air
  labels:
    app: kafka-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-pod
  template:
    metadata:
      labels:
        app: kafka-pod
    spec:
      containers:
        - name: broker
          image: confluentinc/cp-kafka:7.5.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"

---

apiVersion: v1
kind: Service
metadata:
  name: broker
  namespace: shipping-on-the-air
spec:
  ports:
    - port: 9092
      targetPort: 9092
  selector:
    app: kafka-pod

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: shipping-on-the-air
  labels:
    app: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
    scrape_configs:
      - job_name: monitoring-delivery-service
        static_configs:
          - targets:
              - delivery-service:9400
      - job_name: monitoring-api-gateway
        static_configs:
          - targets:
              - api-gateway:9401

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-deployment
  namespace: shipping-on-the-air
  labels:
    app: prometheus-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-pod
  template:
    metadata:
      labels:
        app: prometheus-pod
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-volume
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: prometheus-volume
          configMap:
            name: prometheus-config

---

apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: shipping-on-the-air
spec:
  selector:
    app: prometheus-pod
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
