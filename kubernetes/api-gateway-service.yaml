apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-deployment
  namespace: shipping-on-the-air
  labels:
    app: api-gateway-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway-pod
  template:
    metadata:
      labels:
        app: api-gateway-pod
    spec:
      containers:
        - name:  api-gateway
          image: api-gateway
          imagePullPolicy: IfNotPresent
          command: ["mvn", "exec:java", "-Dexec.mainClass=api_gateway.infrastructure.APIGatewayMain"]
          ports:
            - containerPort: 8080
            - containerPort: 9401

---

apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: shipping-on-the-air
spec:
  selector:
    app: api-gateway-pod
  ports:
    - name: service-port
      port: 8080
      targetPort: 8080
    - name: prometheus-port
      port: 9401
      targetPort: 9401
  type: ClusterIP
